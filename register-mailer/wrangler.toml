name = "lf-register-mailer"
main = "src/worker.js"
compatibility_date = "2024-11-01"

# 17:00 UTC daily = 03:00 Brisbane (AEST, UTC+10, no daylight saving)
[triggers]
crons = ["0 17 * * *"]

